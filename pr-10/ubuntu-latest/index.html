os-co.cachix.org'...\ncopying path '/nix/store/xx5dinc4gldj9mbjnhwn4mvsgwyvyacz-logos-liblogos' from 'https://logos-co.cachix.org'...\ncopying path '/nix/store/1idvh00n2sn896f489ih0m8hxkpg98az-logos-logoscore-cli-bin-0.1.0' from 'https://logos-co.cachix.org'...\ncopying path '/nix/store/5g5r9cr621pkp4dmjqwhkqjsj8kbdnxn-logos-logoscore-cli' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "### 5.2 Install the module into a runtime directory\n\n`logoscore` discovers modules from `modules/<name>/` directories, each\nwith a `manifest.json` beside the plugin. The scaffold's flake exposes a\nready-to-use `#install` output that produces exactly that layout \u2014 build\nit and link it as `./modules-install`.\n\n```bash\ncd logos-crypto-utils\nnix build '.#install' -o ../modules-install\n```\n\n`modules-install/modules/crypto_utils/` now holds the plugin, its\n`manifest.json`, and a platform `variant` marker \u2014 the layout the host\nscans at startup.", "execs": [{"kind": "run", "cmd": "sh -c 'cd logos-crypto-utils && nix build .#install -o ../modules-install'", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/doctest-test-t7mw_au6/logos-crypto-utils' has uncommitted changes\nthese 4 derivations will be built:\n  /nix/store/32rmpwaijz4v3ffhfqqnfyj2qb7rjr5d-logos-crypto_utils-module-lib-1.0.0.drv\n  /nix/store/hhrf6lglqmkmxv05yingzshalv3spzk2-logos-crypto_utils-module-lib-metadata.json.drv\n  /nix/store/b1c1zj8cz30ircshdg5pfzlndbchff5m-logos-crypto_utils-module-lib-lgx-1.0.0.drv\n  /nix/store/nijg34pxxih9ilmqsmfikk174x11snwg-logos-crypto_utils-module-lib-install.drv\nthese 2 paths will be fetched (692.0 KiB download, 1.8 MiB unpacked):\n  /nix/store/hkx5zh22h3d6964ngchi6blxc4pkiyk6-lgx-0.1.0\n  /nix/store/l2kcbdg9hn7lb053lx111smrvi88jl38-logos-package-manager-cli-1.0.0\ncopying path '/nix/store/l2kcbdg9hn7lb053lx111smrvi88jl38-logos-package-manager-cli-1.0.0' from 'https://logos-co.cachix.org'...\ncopying path '/nix/store/hkx5zh22h3d6964ngchi6blxc4pkiyk6-lgx-0.1.0' from 'https://logos-co.cachix.org'...\nbuilding '/nix/store/32rmpwaijz4v3ffhfqqnfyj2qb7rjr5d-logos-crypto_utils-module-lib-1.0.0.drv'...\nbuilding '/nix/store/hhrf6lglqmkmxv05yingzshalv3spzk2-logos-crypto_utils-module-lib-metadata.json.drv'...\nbuilding '/nix/store/b1c1zj8cz30ircshdg5pfzlndbchff5m-logos-crypto_utils-module-lib-lgx-1.0.0.drv'...\nbuilding '/nix/store/nijg34pxxih9ilmqsmfikk174x11snwg-logos-crypto_utils-module-lib-install.drv'...\n", "note": ""}]}, {"md": "### 5.3 Start the daemon\n\nStart logoscore in daemon mode pointed at the installed modules\ndirectory, capturing output to `logs.txt`:\n\n```bash\nlogoscore -D -m modules-install/modules > logs.txt &\n```\n\nThe `-D` flag starts the background daemon; the client subcommands below\nconnect to it via the config under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m modules-install/modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.4 List discovered modules\n\n`crypto_utils` should appear in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"crypto_utils\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "### 5.5 Load the module\n\nLoad `crypto_utils` into the running daemon:\n\n```bash\nlogoscore load-module crypto_utils\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module crypto_utils", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"crypto_utils\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.6 Call echo\n\nCall `echo` with a string argument. This is a real round-trip: the\nclient sends the call to the daemon, the host dispatches it to the\nplugin's generated glue, which invokes `CryptoUtilsImpl::echo`, and the\nresult travels back over IPC.\n\n```bash\nlogoscore call crypto_utils echo hello\n```\n\n`echo: hello` comes straight from `CryptoUtilsImpl::echo` \u2014 the plain\nC++ method you saw in Step 1, now compiled into a Qt plugin, loaded by\nthe host, and invoked over IPC.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call crypto_utils echo hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echo\",\"module\":\"crypto_utils\",\"result\":\"echo: hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.7 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe scaffold this dev-boost commit produced builds, introspects, tests,\nand runs end-to-end.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}, {"meta": {"name": "Wrapping an External C Library with logos-dev-boost", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Wrapping an External C Library with logos-dev-boost\n\nMost real modules wrap an existing C or C++ library \u2014 libsodium, SQLite, a\nvendor SDK. `logos-dev-boost` automates the boilerplate: point `init` at a\ndirectory of C sources with `--lib-dir`, and it parses the header, copies the\nlibrary in, and **generates a pure C++ wrapper class** with one method per C\nfunction, mapping C types to the Logos type system. (`--lib-dir` implies\n`--external-lib`; passing `--external-lib` alone scaffolds an empty external\nlibrary you fill in by hand.)\n\nThis doc-test exercises **this** dev-boost commit end-to-end on that workflow:\n\n1. Write a tiny C library, `libcipher` (a header + its `.c` source).\n2. Scaffold a `crypto_utils` module with\n   `init crypto_utils --type module --lib-dir ./lib` \u2014 built from the commit\n   under test. The scaffold parses `libcipher.h` and generates a\n   `CryptoUtilsImpl` C++ class wrapping every function.\n3. Build the module. The C source is compiled straight into the plugin and the\n   Qt glue is generated from the wrapper header \u2014 no Qt in your code.\n4. Introspect the compiled plugin with `lm` and run the generated unit tests.\n5. Install the module and call its methods through the `logoscore` daemon \u2014\n   each call a real round-trip into the wrapped C library.\n\nA green run is real evidence that `init --lib-dir` still produces a module that\ncorrectly wraps a C library and runs end-to-end.\n\n**What you'll build:** A `crypto_utils` module wrapping a small C library (`libcipher`), scaffolded by this dev-boost commit, then built, introspected, unit-tested, and called through `logoscore`.\n\n**What you'll learn:**\n\n- How `init --lib-dir` parses a C header and generates a C++ wrapper class\n- How C types map to the Logos type system (`int` \u2192 `int64_t`, `const char*` \u2192 `std::string`)\n- How a source-only C library is compiled straight into the plugin\n- How to introspect, unit-test, and call the wrapped module through `logoscore`\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **git** \u2014 the scaffolded project is a flake, and Nix only sees git-tracked files.\n- A Linux or macOS machine.", "execs": []}, {"md": "## Step 1: Write the C library to wrap\n\nStart with a small, self-contained C library: a header declaring three\nfunctions and its implementation. This stands in for any real C library you\nmight wrap (libsodium, SQLite, a vendor SDK).", "execs": []}, {"md": "### 1.1 Create lib/libcipher.h\n\n```c\n#ifndef LIBCIPHER_H\n#define LIBCIPHER_H\n\n#ifdef __cplusplus\nextern \"C\" {\n#endif\n\n/** Sum of the byte values of `text` (a simple checksum). */\nint cipher_checksum(const char* text);\n\n/** Caesar-shift a character code by `shift` positions. */\nint cipher_caesar_shift(int code, int shift);\n\n/** Library version string. Caller must NOT free. */\nconst char* cipher_version(void);\n\n#ifdef __cplusplus\n}\n#endif\n\n#endif /* LIBCIPHER_H */\n```", "execs": [{"kind": "file", "cmd": "write lib/libcipher.h", "status": "pass", "note": "Wrote lib/libcipher.h"}]}, {"md": "### 1.2 Create lib/libcipher.c\n\n```c\n#include \"libcipher.h\"\n\nint cipher_checksum(const char* text)\n{\n    int sum = 0;\n    if (!text) return 0;\n    for (const char* p = text; *p; ++p)\n        sum += (unsigned char)*p;\n    return sum;\n}\n\nint cipher_caesar_shift(int code, int shift)\n{\n    return code + shift;\n}\n\nconst char* cipher_version(void)\n{\n    return \"1.0.0\";\n}\n```\n\nThe library directory now holds just `lib/libcipher.h` and\n`lib/libcipher.c` \u2014 a source-only C library, no pre-built binaries.", "execs": [{"kind": "file", "cmd": "write lib/libcipher.c", "status": "pass", "note": "Wrote lib/libcipher.c"}]}, {"md": "## Step 2: Scaffold the module\n\nRun `init` with `--lib-dir ./lib`. dev-boost parses `libcipher.h`, copies\nthe library into the project, and generates a `CryptoUtilsImpl` C++ class\nwith one method per C function \u2014 converting C types to the Logos type\nsystem as it goes.\n\n> `` pins dev-boost to the commit under test: the runner expands it\n> to this checkout's `HEAD` locally (see `run.sh`), or the PR commit in CI.\n> With no pin it falls back to the latest published `master`.", "execs": []}, {"md": "### 2.1 Run init with --lib-dir\n\n```bash\nnix run github:logos-co/logos-dev-boost -- init crypto_utils --type module --lib-dir ./lib\n```\n\nThe scaffold copies the library in and generates the wrapper, build\nfiles, and one unit test per function:\n\n```\nlogos-crypto-utils/\n\u251c\u2500\u2500 lib/\n\u2502   \u251c\u2500\u2500 libcipher.h             # copied from --lib-dir\n\u2502   \u2514\u2500\u2500 libcipher.c             # compiled into the plugin\n\u251c\u2500\u2500 src/\n\u2502   \u251c\u2500\u2500 crypto_utils_impl.h     # generated C++ wrapper class\n\u2502   \u2514\u2500\u2500 crypto_utils_impl.cpp   # calls through to the C functions\n\u251c\u2500\u2500 tests/                      # one test per wrapped function\n\u251c\u2500\u2500 metadata.json               # declares the external library\n\u251c\u2500\u2500 CMakeLists.txt              # LANGUAGES C CXX; compiles libcipher.c\n\u2514\u2500\u2500 flake.nix\n```", "execs": [{"kind": "run", "cmd": "nix run 'github:logos-co/logos-dev-boost/42fe85239057d661629adb682bd2d64f5ef105f1' -- init crypto_utils --type module --lib-dir ./lib", "status": "pass", "exit_code": 0, "output": "\nScaffolding Logos module: crypto_utils\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nCreated 10 files in logos-crypto-utils/\n  logos-crypto-utils/lib/libcipher.c\n  logos-crypto-utils/lib/libcipher.h\n  logos-crypto-utils/metadata.json\n  logos-crypto-utils/src/crypto_utils_impl.h\n  logos-crypto-utils/src/crypto_utils_impl.cpp\n  logos-crypto-utils/CMakeLists.txt\n  logos-crypto-utils/flake.nix\n  logos-crypto-utils/tests/main.cpp\n  logos-crypto-utils/tests/test_crypto_utils.cpp\n  logos-crypto-utils/tests/CMakeLists.txt\n\nGenerating AI context files...\n  AGENTS.md\n  CLAUDE.md\n  .mcp.json (MCP server \u2014 auto-detected by Claude Code & Cursor)\n  .claude/skills/ (9 skills for Claude Code)\n\nNext steps:\n  cd logos-crypto-utils\n  git init && git add -A\n  nix build\n  nix build .#unit-tests -L\n  logoscore -D -m ./result/lib -l crypto_utils &\n  logoscore call crypto_utils checksum hello\n  logoscore score`](https://github.com/logos-co/logos-logoscore-cli), install the\nmodule into a runtime `modules/` directory, then start the daemon and call\nthe wrapped functions \u2014 each call a real round-trip through the C library.", "execs": []}, {"md": "### 6.1 Build logoscore\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli' -o logos\n```\n\nThe runtime is at `./logos/bin/logoscore`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli' -o logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 6.2 Install the module into a runtime directory\n\n`logoscore` discovers modules from `modules/<name>/` directories, each\nwith a `manifest.json`. The scaffold's flake exposes a ready-to-use\n`#install` output that produces exactly that layout.\n\n```bash\ncd logos-crypto-utils\nnix build '.#install' -o ../modules-install\n```", "execs": [{"kind": "run", "cmd": "sh -c 'cd logos-crypto-utils && nix build .#install -o ../modules-install'", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/doctest-test-d8wr28aa/logos-crypto-utils' has uncommitted changes\nthese 4 derivations will be built:\n  /nix/store/5y1b6rchwjq6k5ixd84110cxixdc6204-logos-crypto_utils-module-lib-metadata.json.drv\n  /nix/store/mywn8ak1v644wqqkqpxa41k69s8rqn59-logos-crypto_utils-module-lib-1.0.0.drv\n  /nix/store/2hbnv7xc2xb22vx13b5kzqyx8c0x0h08-logos-crypto_utils-module-lib-lgx-1.0.0.drv\n  /nix/store/xz023jl55i3n8071s6l5ffs7fg1fy3nm-logos-crypto_utils-module-lib-install.drv\nbuilding '/nix/store/mywn8ak1v644wqqkqpxa41k69s8rqn59-logos-crypto_utils-module-lib-1.0.0.drv'...\nbuilding '/nix/store/5y1b6rchwjq6k5ixd84110cxixdc6204-logos-crypto_utils-module-lib-metadata.json.drv'...\nbuilding '/nix/store/2hbnv7xc2xb22vx13b5kzqyx8c0x0h08-logos-crypto_utils-module-lib-lgx-1.0.0.drv'...\nbuilding '/nix/store/xz023jl55i3n8071s6l5ffs7fg1fy3nm-logos-crypto_utils-module-lib-install.drv'...\n", "note": ""}]}, {"md": "### 6.3 Start the daemon\n\nStart logoscore in daemon mode pointed at the installed modules\ndirectory, capturing output to `logs.txt`:\n\n```bash\nlogoscore -D -m modules-install/modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m modules-install/modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 6.4 Load the module\n\nLoad `crypto_utils` into the running daemon:\n\n```bash\nlogoscore load-module crypto_utils\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module crypto_utils", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"crypto_utils\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 6.5 Call checksum\n\n`cipher_checksum` sums the byte values of its argument. For `hello` that\nis `104 + 101 + 108 + 108 + 111 = 532` \u2014 a deterministic round-trip\nthrough the wrapped C function:\n\n```bash\nlogoscore call crypto_utils checksum hello\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call crypto_utils checksum hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"checksum\",\"module\":\"crypto_utils\",\"result\":532,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 6.6 Call caesar_shift\n\n`cipher_caesar_shift` adds `shift` to a character code. `5 + 3` is `8`,\nexercising an `int \u2192 int64_t` round-trip in both directions:\n\n```bash\nlogoscore call crypto_utils caesar_shift 5 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call crypto_utils caesar_shift 5 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"caesar_shift\",\"module\":\"crypto_utils\",\"result\":8,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 6.7 Call version\n\n`cipher_version` returns a C string; the wrapper converts it to a\n`std::string`, which comes back as `\"1.0.0\"`:\n\n```bash\nlogoscore call crypto_utils version\n```\n\nThree real calls into the wrapped `libcipher` \u2014 a checksum, an integer\nshift, and a version string \u2014 all dispatched over IPC into C functions\nthe scaffold wrapped automatically from the header.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call crypto_utils version", "status": "pass", "exit_code": 0, "output": "{\"method\":\"version\",\"module\":\"crypto_utils\",\"result\":\"1.0.0\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 6.8 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe module this dev-boost commit scaffolded from a raw C library builds,\nintrospects, tests, and runs end-to-end.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}, {"meta": {"name": "Scaffolding a QML UI App with logos-dev-boost", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Scaffolding a QML UI App with logos-dev-boost\n\nNot every Logos component is a headless module \u2014 many are **UI apps** shown in\nthe Basecamp workspace. The simplest kind is a pure QML app: no C++, no\ncompilation, just a `Main.qml` that the host renders and that talks to backend\nmodules through the injected `logos` bridge. `logos-dev-boost` scaffolds one\nwith a single command.\n\nThis doc-test exercises **this** dev-boost commit end-to-end on that workflow:\n\n1. Scaffold a `notes_ui` app with `init notes_ui --type ui-qml` \u2014 built from the\n   commit under test, not the latest published flake.\n2. Give its button something visible to do \u2014 a tiny \"Add Note\" counter, so the\n   UI has a state change we can drive and confirm.\n3. Build it. Because the UI is built with\n   [`logos-app-builder`](https://github.com/logos-co/logos-app-builder) via\n   `mkLogosQmlModule`, its flake exposes a standalone app (`apps.default`) that\n   `nix run` launches in its own window.\n4. **Launch the app headlessly** (`QT_QPA_PLATFORM=offscreen`) and drive it\n   through its QML inspector with\n   [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp): wait for the UI,\n   screenshot the initial state, **click the button**, confirm the on-screen\n   text changes in response, and screenshot the result. The screenshots are\n   embedded in the rendered tutorial and the CI report.\n\nA green run is real evidence that `init --type ui-qml` still produces a UI app\nthat builds, renders, and responds to interaction.\n\n**What you'll build:** The `notes_ui` standalone QML app, scaffolded by this dev-boost commit and driven headlessly through its QML UI \u2014 clicking a button and confirming the UI responds.\n\n**What you'll learn:**\n\n- How `init --type ui-qml` scaffolds a pure QML Basecamp app\n- How a UI built with logos-app-builder exposes a standalone `nix run` app\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert, screenshot)\n- How to confirm a UI interaction by asserting on the resulting on-screen change\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **git** \u2014 the scaffolded project is a flake, and Nix only sees git-tracked files.\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.", "execs": []}, {"md": "## Step 1: Scaffold the UI app\n\nRun `init` with `--type ui-qml`. This is the pure-QML app type: a single\n`Main.qml` rendered by the host, no C++ to compile. The command creates a\n`logos-notes-ui/` directory with the QML view, `metadata.json`, a\n`flake.nix`, and AI context files.\n\n> `` pins dev-boost to the commit under test: the runner expands it\n> to this checkout's `HEAD` locally (see `run.sh`), or the PR commit in CI.\n> With no pin it falls back to the latest published `master`.", "execs": []}, {"md": "### 1.1 Run init\n\n```bash\nnix run github:logos-co/logos-dev-boost -- init notes_ui --type ui-qml\n```\n\nThe scaffold lays out a complete, runnable QML app:\n\n```\nlogos-notes-ui/\n\u251c\u2500\u2500 Main.qml                    # The QML view \u2014 your UI\n\u251c\u2500\u2500 metadata.json               # type: ui_qml, view: Main.qml\n\u251c\u2500\u2500 flake.nix                   # mkLogosQmlModule (standalone app)\n\u251c\u2500\u2500 AGENTS.md / CLAUDE.md       # AI context\n\u2514\u2500\u2500 .mcp.json / .claude/skills/ # MCP server + on-demand skills\n```", "execs": [{"kind": "run", "cmd": "nix run 'github:logos-co/logos-dev-boost/42fe85239057d661629adb682bd2d64f5ef105f1' -- init notes_ui --type ui-qml", "status": "pass", "exit_code": 0, "output": "\nScaffolding Logos ui-qml: notes_ui\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nCreated 4 files in logos-notes-ui/\n  logos-notes-ui/metadata.json\n  logos-notes-ui/.gitignore\n  logos-notes-ui/Main.qml\n  logos-notes-ui/flake.nix\n\nGenerating AI context files...\n  AGENTS.md\n  CLAUDE.md\n  .mcp.json (MCP server \u2014 auto-detected by Claude Code & Cursor)\n  .claude/skills/ (9 skills for Claude Code)\n\nNext steps:\n  cd logos-notes-ui\n  git init && git add -A\n  nix build\n  nix run .\n", "note": ""}]}, {"md": "### 1.2 Inspect the QML view\n\nThe scaffold's `Main.qml` shows a title, a subtitle, and a button wired\nto call a backend module via the `logos` bridge (commented out until you\nadd a dependency). It uses no C++ \u2014 the host renders it directly.\n\n```bash\ncat logos-notes-ui/Main.qml\n```\n\n`metadata.json` declares `\"type\": \"ui_qml\"` and `\"view\": \"Main.qml\"` \u2014\nthat is what tells the host to render this as a UI app rather than load\nit as a headless module.", "execs": [{"kind": "run", "cmd": "cat logos-notes-ui/Main.qml", "status": "pass", "exit_code": 0, "output": "import QtQuick 2.15\nimport QtQuick.Controls 2.15\nimport QtQuick.Layouts 1.15\n\nItem {\n    id: root\n    width: 400\n    height: 300\n\n    ColumnLayout {\n        anchors.fill: parent\n        anchors.margins: 24\n        spacing: 16\n\n        Text {\n            Layout.alignment: Qt.AlignHCenter\n            text: \"NotesUi\"\n            font.pixelSize: 24\n            font.bold: true\n            color: \"#ffffff\"\n        }\n\n        Text {\n            Layout.alignment: Qt.AlignHCenter\n            text: \"Logos UI app\"\n            font.pixelSize: 14\n            color: \"#a0a0a0\"\n        }\n\n        Button {\n            Layout.alignment: Qt.AlignHCenter\n            text: \"Call Backend Module\"\n            onClicked: {\n                // The logos bridge is injected by the host application.\n                // Uncomment to call a backend module:\n                // var result = logos.callModule(\"my_module\", \"myMethod\", [\"arg\"])\n                console.log(\"Button clicked\")\n            }\n        }\n    }\n}\n", "note": ""}]}, {"md": "## Step 2: Make the button do something\n\nThe template button only logs to the console. To have a UI response we can\nactually see and confirm, replace `Main.qml` with a tiny **\"Add Note\"\ncounter**: a status line that reads `No notes yet`, and a button that\nincrements a count and updates the status to `Added note #N`. This is still\npure QML \u2014 no backend, no C++.", "execs": []}, {"md": "### 2.1 Replace Main.qml with an interactive counter\n\n```qml\nimport QtQuick 2.15\nimport QtQuick.Controls 2.15\nimport QtQuick.Layouts 1.15\n\nItem {\n    id: root\n    width: 400\n    height: 300\n\n    // The piece of state the button changes.\n    property int count: 0\n\n    ColumnLayout {\n        anchors.fill: parent\n        anchors.margins: 24\n        spacing: 16\n\n        Text {\n            Layout.alignment: Qt.AlignHCenter\n            text: \"NotesUi\"\n            font.pixelSize: 24\n            font.bold: true\n            color: \"#1f2328\"\n        }\n\n        // Reacts to `count`: the visible proof a click did something.\n        Text {\n            Layout.alignment: Qt.AlignHCenter\n            text: root.count === 0\n                ? \"No notes yet\"\n                : \"Added note #\" + root.count\n            font.pixelSize: 16\n            color: \"#1a7f37\"\n        }\n\n        Button {\n            Layout.alignment: Qt.AlignHCenter\n            text: \"Add Note\"\n            onClicked: root.count += 1\n        }\n    }\n}\n```\n\nThe status `Text` binds to `count`, so each click of **Add Note**\nre-renders it from `No notes yet` to `Added note #1`, `#2`, and so on \u2014\na state change the headless test can drive and assert on.", "execs": [{"kind": "file", "cmd": "write logos-notes-ui/Main.qml", "status": "pass", "note": "Wrote logos-notes-ui/Main.qml"}]}, {"md": "## Step 3: Build the app\n\n`nix build` packages the QML app. `mkLogosQmlModule` stages the QML and\nmetadata into a plugin and wires up `apps.default`, so the flake exposes a\nstandalone app that `nix run` launches in its own window. Nix only sees\ngit-tracked files, so we `git init` and stage everything first.", "execs": []}, {"md": "### 3.1 Init git, stage, and build\n\n```bash\ncd logos-notes-ui\ngit init && git add -A\nnix build\n```\n\nThe build produces a `result` with the staged QML plugin and the\nstandalone app entry point.", "execs": [{"kind": "run", "cmd": "sh -c 'cd logos-notes-ui && git init -q && git add -A && nix build'", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/doctest-test-pxhddjfg/logos-notes-ui' has uncommitted changes\nwarning: creating lock file \"/tmp/doct BCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCD/DxYALPPvMocpAAAAAElFTkSuQmCC)\n\nThis is a real interaction driven headlessly: the test reads the initial\non-screen text (`No notes yet`), clicks the **Add Note** button by its\nlabel, and then asserts the status line re-rendered to `Added note #1`.\nBecause the wait would time out if the click had no effect, a green run\nproves the scaffolded app builds, renders, and responds to input. Both\nscreenshots are embedded above and in the CI report.", "execs": [{"kind": "ui_test", "cmd": "nix run ./logos-notes-ui\n\n# test actions:\n- App window opens in its initial state: wait for ['NotesUi', 'No notes yet', 'Add Note']\n- Capture the initial UI: sleep 1000ms\n- Click the Add Note button: click 'Add Note'\n- Status text changes in response to the click: wait for ['Added note #1']\n- Capture the UI after the click: sleep 1500ms", "status": "pass", "output": "\nRunning 1 test(s)...\n\n  \u001b[32m\u2713\u001b[0m Scaffolding a QML UI App with logos-dev-boost: Launch and drive the app\n\n1 passed, 0 failed\n\n", "note": ""}]}]}, {"meta": {"name": "Scaffolding a QML UI App with a C++ Backend (logos-dev-boost)", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Scaffolding a QML UI App with a C++ Backend (logos-dev-boost)\n\nThe [companion doc-test](dev-boost-scaffold-ui-qml.md) scaffolds a **pure\nQML** app: a `Main.qml` the host renders, with no C++ and all logic in the\nview. This one covers the next step up \u2014 `--type ui-qml-backend`, a UI app\nwhose logic lives in a **process-isolated C++ backend**. The QML view runs in\nthe host; the backend runs in a separate `ui-host` process; the two talk over\n[Qt Remote Objects](https://doc.qt.io/qt-6/qtremoteobjects-index.html) via a\ntyped replica. A backend crash can't take the host down with it.\n\nUnlike the pure-QML template (whose default button only logs to the console),\nthe `ui-qml-backend` scaffold is **interactive out of the box**: the generated\nC++ backend computes `add(a, b)` in its own process and hands the result back\nto the view. It declares no module dependencies, so it builds and runs\nstandalone \u2014 no extra modules to wire up.\n\nThis doc-test exercises **this** dev-boost commit end-to-end on that workflow:\n\n1. Scaffold a `notes_app` with `init notes_app --type ui-qml-backend` \u2014 built\n   from the commit under test, not the latest published flake.\n2. Reshape the generated `.rep` interface and backend so the app speaks\n   *notes*: a single `recordNote()` slot that records a note in the backend and\n   returns a confirmation string. This is the real development loop \u2014 edit the\n   `.rep`, and `repc` regenerates the typed source/replica the backend and QML\n   build against.\n3. Build it. `mkLogosQmlModule` compiles the backend, runs `repc`, builds the\n   replica-factory plugin, bundles the QML, and exposes a standalone\n   `nix run` app.\n4. **Launch the app headlessly** (`QT_QPA_PLATFORM=offscreen`) and drive it\n   through its QML inspector with\n   [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp): wait for the\n   view to report **Connected** (the replica finished its async handshake with\n   the ui-host backend), screenshot the initial state, **click Add Note**,\n   confirm the on-screen text changes from `No notes yet` to `Added note #1` \u2014\n   a value computed in the isolated backend and returned over the socket \u2014 then\n   screenshot the result.\n\nA green run is real evidence that `init --type ui-qml-backend` still produces a\nUI app that builds, spawns its backend, completes the Remote Objects handshake,\nand round-trips a call through the isolated backend and back into the view.\n\n**What you'll build:** The `notes_app` standalone UI app \u2014 a QML view over a process-isolated C++ backend, scaffolded by this dev-boost commit and driven headlessly: clicking a button, calling into the backend, and confirming the value it returns appears on screen.\n\n**What you'll learn:**\n\n- How `init --type ui-qml-backend` scaffolds a QML view plus a process-isolated C++ backend\n- How the `.rep` file is the single source of truth `repc` turns into the typed source + replica\n- How a SLOT return value reaches QML via `logos.watch()` \u2014 call into the backend, reply over the socket\n- How to confirm a Qt Remote Objects round-trip headlessly with logos-qt-mcp (wait for ready, click, assert, screenshot)\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **git** \u2014 the scaffolded project is a flake, and Nix only sees git-tracked files.\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.", "execs": []}, {"md": "## Step 1: Scaffold the backend UI app\n\nRun `init` with `--type ui-qml-backend`. This is the QML-plus-C++ app type:\na `Main.qml` rendered by the host, backed by a C++ plugin that runs in a\nseparate `ui-host` process. The command creates a `logos-notes-app/`\ndirectory with the QML view, the backend sources, a `.rep` interface\ndefinition, `metadata.json`, a `flake.nix`, and AI context files.\n\n> `` pins dev-boost to the commit under test: the runner expands it\n> to this checkout's `HEAD` locally (see `run.sh`), or the PR commit in CI.\n> With no pin it falls back to the latest published `master`.", "execs": []}, {"md": "### 1.1 Run init\n\n```bash\nnix run github:logos-co/logos-dev-boost -- init notes_app --type ui-qml-backend\n```\n\nThe scaffold lays out a complete, runnable backend UI app:\n\n```\nlogos-notes-app/\n\u251c\u2500\u2500 src/\n\u2502   \u251c\u2500\u2500 notes_app.rep            # Remote interface \u2014 the source of truth for repc\n\u2502   \u251c\u2500\u2500 notes_app_interface.h    # Logos plugin interface (name/version)\n\u2502   \u251c\u2500\u2500 notes_app_plugin.h       # Backend: inherits NotesAppSimpleSource\n\u2502   \u251c\u2500\u2500 notes_app_plugin.cpp     # Backend implementation (runs in ui-host)\n\u2502   \u2514\u2500\u2500 qml/Main.qml             # The QML view \u2014 talks to the backend replica\n\u251c\u2500\u2500 metadata.json                # type: ui_qml, main: notes_app_plugin\n\u251c\u2500\u2500 CMakeLists.txt               # logos_module(... REP_FILE src/notes_app.rep)\n\u251c\u2500\u2500 flake.nix                    # mkLogosQmlModule (standalone app)\n\u251c\u2500\u2500 AGENTS.md / CLAUDE.md         # AI context\n\u2514\u2500\u2500 .mcp.json / .claude/skills/  # MCP server + on-demand skills\n```", "execs": [{"kind": "run", "cmd": "nix run 'github:logos-co/logos-dev-boost/42fe85239057d661629adb682bd2d64f5ef105f1' -- init notes_app --type ui-qml-backend", "status": "pass", "exit_code": 0, "output": "\nScaffolding Logos ui-qml-backend: notes_app\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nCreated 9 files in logos-notes-app/\n  logos-notes-app/metadata.json\n  logos-notes-app/.gitignore\n  logos-notes-app/src/notes_app_interface.h\n  logos-notes-app/src/notes_app.rep\n  logos-notes-app/src/notes_app_plugin.h\n  logos-notes-app/src/notes_app_plugin.cpp\n  logos-notes-app/src/qml/Main.qml\n  logos-notes-app/CMakeLists.txt\n  logos-notes-app/flake.nix\n\nGenerating AI context files...\n  AGENTS.md\n  CLAUDE.md\n  .mcp.json (MCP server \u2014 auto-detected by Claude Code & Cursor)\n  .claude/skills/ (9 skills for Claude Code)\n\nNext steps:\n  cd logos-notes-app\n  git init && git add -A\n  nix build\n  nix run .\n", "note": ""}]}, {"md": "### 1.2 Inspect the generated interface and backend\n\nThe `.rep` file is the **single source of truth** for what crosses the\nprocess boundary. At build time Qt's `repc` compiler turns it into a\n`NotesAppSimpleSource` base class (which the backend overrides) and a\n`NotesAppReplica` (which the QML view consumes). The scaffold ships a\ntwo-line interface \u2014 one auto-synced property, one callable slot:\n\n```bash\ncat logos-notes-app/src/notes_app.rep\n```\n\nTwo kinds of member, two interaction patterns:\n\n- **`SLOT(int add(int a, int b))`** \u2014 a *call and reply*. QML invokes it\n  on the replica; the call runs in the backend process; the return value\n  comes back asynchronously. In QML you read it with `logos.watch(...)`.\n  This doc-test drives the app through a slot like this one.\n- **`PROP(QString status READWRITE)`** \u2014 *auto-synced state*. When the\n  backend calls `setStatus(...)`, the new value propagates to the replica\n  and any QML bound to `backend.status` updates. (Binding a `var`-typed\n  dynamic replica's property reactively in QML has its own subtleties, so\n  the proven pattern \u2014 and the one we drive below \u2014 routes confirmable\n  results through the slot's reply.)\n\n`metadata.json` declares `\"type\": \"ui_qml\"` with `\"main\":\n\"notes_app_plugin\"` \u2014 the `main` field is what tells the builder there's\na compiled backend, not just a QML file.", "execs": [{"kind": "run", "cmd": "cat logos-notes-app/src/notes_app.rep", "status": "pass", "exit_code": 0, "output": "class NotesApp\n{\n    PROP(QString status READWRITE)\n    SLOT(int add(int a, int b))\n}\n", "note": ""}]}, {"md": "## Step 2: Make it a notes app\n\nThe scaffold is a generic adder. To give the UI a concrete, observable job \u2014\nand to exercise the real edit-the-`.rep` development loop \u2014 reshape the\ninterface so it speaks *notes*. We change three files in lockstep, because\nthe `.rep` is a contract the other two must honor:\n\n- **`notes_app.rep`** \u2014 replace `add()` with a `recordNote()` slot returning\n  a `QString` confirmation. (We keep the `status` property the scaffold\n  ships, so the backend still demonstrates `setStatus()`.)\n- **`notes_app_plugin.h`** \u2014 match the new slot signature the generated\n  `NotesAppSimpleSource` now declares.\n- **`notes_app_plugin.cpp`** \u2014 count notes in the backend and return a\n  confirmation string for each one.\n\nEverything still runs in the isolated backend process; only the interface\nchanges.", "execs": []}, {"md": "### 2.1 Rewrite the .rep interface\n\nA single slot that records a note and returns a confirmation string,\nplus the auto-synced `status` line:\n\n```rep\nclass NotesApp\n{\n    // Auto-synced to the QML replica: the backend updates this and the\n    // view re-renders with no explicit call.\n    PROP(QString status READWRITE)\n\n    // Call-and-reply: records a note in the backend and returns a\n    // confirmation the view shows via logos.watch().\n    SLOT(QString recordNote())\n}\n```\n\n`repc` regenerates `NotesAppSimpleSource` from this on the next build \u2014\nthe backend's override and the replica the QML consumes both come from\nhere, so the three files stay in sync by construction.", "execs": [{"kind": "file", "cmd": "write logos-notes-app/src/notes_app.rep", "status": "pass", "note": "Wrote logos-notes-app/src/notes_app.rep"}]}, {"md": "### 2.2 Match the slot in the backend header\n\nReplace the generated `int add(int a, int b)` slot with the new\nsignature. The class still inherits the three generated bases \u2014\n`NotesAppSimpleSource` (typed source), `NotesAppInterface` (Logos\nplugin), and `NotesAppViewPluginBase` (remoting glue):\n\n```cpp\n#ifndef NOTES_APP_PLUGIN_H\n#define NOTES_APP_PLUGIN_H\n\n#include <QString>\n#include <QVariantList>\n#include \"notes_app_interface.h\"\n#include \"LogosViewPluginBase.h\"\n#include \"rep_notes_app_source.h\"\n\nclass LogosAPI;\n\nclass NotesAppPlugin : public NotesAppSimpleSource,\n                       public NotesAppInterface,\n                       public NotesAppViewPluginBase\n{\n    Q_OBJECT\n    Q_PLUGIN_METADATA(IID NotesAppInterface_iid FILE \"metadata.json\")\n    Q_INTERFACES(NotesAppInterface)\n\npublic:\n    explicit NotesAppPlugin(QObject* parent = nullptr);\n    ~NotesAppPlugin() override;\n\n    QString name()    const override { return \"notes_app\"; }\n    QString version() const override { return \"1.0.0\"; }\n\n    Q_INVOKABLE void initLogos(LogosAPI* api);\n\n    // Slot from notes_app.rep \u2014 records a note and returns a confirmation.\n    QString recordNote() override;\n\nsignals:\n    void eventResponse(const QString& eventName, const QVariantList& args);\n\nprivate:\n    LogosAPI* m_logosAPI = nullptr;\n    int m_noteCount = 0;\n};\n\n#endif // NOTES_APP_PLUGIN_H\n```\n\nThe only interface change from the scaffold is the slot: `int add(int,\nint)` becomes `QString recordNote()`, and we add an `m_noteCount` member\nto hold the backend's state across calls.", "execs": [{"kind": "file", "cmd": "write logos-notes-app/src/notes_app_plugin.h", "status": "pass", "note": "Wrote logos-notes-app/src/notes_app_plugin.h"}]}, {"md": "### 2.3 Implement the backend\n\nOn each call, bump the count, update the auto-synced `status`, and return\na confirmation string. Both the property write and the return value cross\nthe process boundary back to the view:\n\n```cpp\n#include \"notes_app_plugin.h\"\n#include \"logos_api.h\"\n#include <QDebug>\n\nNotesAppPlugin::NotesAppPlugin(QObject* parent)\n    : NotesAppSimpleSource(parent)\n{\n    setStatus(\"No notes yet\");\n}\n\nNotesAppPlugin::~NotesAppPlugin() = default;\n\nvoid NotesAppPlugin::initLogos(LogosAPI* api)\n{\n    m_logosAPI = api;\n    setBackend(this);\n    qDebug() << \"NotesAppPlugin: initialized\";\n}\n\nQString NotesAppPlugin::recordNote()\n{\n    m_noteCount += 1;\n    // Auto-synced PROP: the view's \"Notes: N\" line re-renders on its own.\n    setStatus(QStringLiteral(\"Notes: %1\").arg(m_noteCount));\n    // SLOT return value: delivered to the caller via logos.watch().\n    return QStringLiteral(\"Added note #%1\").arg(m_noteCount);\n}\n```\n\n`setStatus()` (inherited from the generated `NotesAppSimpleSource`)\npushes the new property value to the replica; the `return` travels back\nas the slot's pending reply. The two are independent channels, and the\nUI test below asserts on **both**.", "execs": [{"kind": "file", "cmd": "write logos-notes-app/src/notes_app_plugin.cpp", "status": "pass", "note": "Wrote logos-notes-app/src/notes_app_plugin.cpp"}]}, {"md": "### 2.4 Update the QML view\n\nPoint the view at the new slot. The structure is the scaffold's own \u2014\nresolve the typed replica with `logos.module(\"notes_app\")`, track the\nasync `ready` state, gate the button on it \u2014 with the button now calling\n`recordNote()` and a status line bound to the auto-synced `status`\nproperty:\n\n```qml\nimport QtQuick\nimport QtQuick.Controls\nimport QtQuick.Layouts\n\nItem {\n    id: root\n\n    // Typed replica of the backend running in the ui-host process.\n    readonly property var backend: logos.module(\"notes_app\")\n    property bool ready: false\n\n    // Auto-synced PROP \u2014 updates on its own when the backend calls setStatus().\n    readonly property string status: backend ? backend.status : \"\"\n\n    // The backend connects asynchronously, so the replica isn't usable\n    // the instant the view loads. isViewModuleReady() is a Q_INVOKABLE\n    // (not a property), so re-check it on the signal and once at startup.\n    Connections {\n        target: logos\n        function onViewModuleReadyChanged(moduleName, isReady) {\n            if (moduleName === \"notes_app\")\n                root.ready = isReady && root.backend !== null;\n        }\n    }\n    Component.onCompleted: {\n        root.ready = root.backend !== null && logos.isViewModuleReady(\"notes_app\");\n    }\n\n    ColumnLayout {\n        anchors.fill: parent\n        anchors.margins: 24\n        spacing: 16\n\n        Text {\n            text: \"NotesApp (C++ backend)\"\n            font.pixelSize: 20\n            font.bold: true\n            color: \"#ffffff\"\n            Layout.alignment: Qt.AlignHCenter\n        }\n\n        // Reactive backend-connection indicator.\n        Text {\n            text: root.ready ? \"Connected\" : \"Connecting to backend...\"\n            color: root.ready ? \"#56d364\" : \"#f0883e\"\n            font.pixelSize: 12\n            Layout.alignment: Qt.AlignHCenter\n        }\n\n        Button {\n            text: \"Add Note\"\n            enabled: root.ready\n            Layout.alignment: Qt.AlignHCenter\n            onClicked: {\n                // SLOT call: the reply comes back via logos.watch().\n                logos.watch(backend.recordNote(),\n                    function(value) { resultText.text = String(value) },\n                    function(error) { resultText.text = \"Error: \" + error }\n                )\n            }\n        }\n\n        // Shows the slot's RETURN VALUE (call-and-reply).\n        Text {\n            id: resultText\n            text: \"Press Add Note to record one\"\n            color: \"#56d364\"\n            font.pixelSize: 15\n            Layout.alignment: Qt.AlignHCenter\n        }\n\n        // Shows the auto-synced PROP (no explicit call).\n        Text {\n            text: \"Backend status: \" + root.status\n            color: \"#8b949e\"\n            font.pixelSize: 13\n            Layout.alignment: Qt.AlignHCenter\n        }\n\n        Item { Layout.fillHeight: true }\n    }\n}\n```\n\n`resultText` shows the **return value** of `recordNote()`, delivered\nthrough `logos.watch()` \u2014 the call-and-reply channel the headless test\nasserts on. The status line below it binds to `backend.status` for\nreference; the confirmable proof of the round-trip is the returned string,\nwhich is what we drive and check.", "execs": [{"kind": "file", "cmd": "write logos-notes-app/src/qml/Main.qml", "status": "pass", "note": "Wrote logos-notes-app/src/qml/Main.qml"}]}, {"md": "## Step 3: Build the app\n\n`nix build` compiles the backend and packages the app. `mkLogosQmlModule`\nsees `main` in `metadata.json`, so it runs `repc` on the `.rep`, compiles\n`notes_app_plugin`, builds the separate `notes_app_replica_factory` the host\nloads to mint typed replicas, bundles the QML, and wires up `apps.default`.\nNix only sees git-tracked files, so we `git init` and stage everything first.", "execs": []}, {"md": "### 3.1 Init git, stage, and build\n\n```bash\ncd logos-notes-app\ngit init && git add -A\nnix build\n```\n\nThe build produces a `result` containing the compiled backend plugin, the\nreplica factory, the staged QML, and the standalone app entry point.", "execs": [{"kind": "run", "cmd": "sh -c 'cd logos-notes-app && git init -q && git add -A && nix build'", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/doctest-test-prj69per/logos-notes-app' has uncommitted changes\nwarning: creating lock file \"/tmp/doctest-test-prj69per/logos-notes-app/flake.lock\": \n\u2022 Added input 'logos-module-builder':\n    'github:logos-co/logos-module-builder/aa5b5d3' (2026-06-09)\n\u2022 Added input 'logos-module-builder/logos-cpp-sdk':\n    'github:logos-co/logos-cpp-sdk/40e7631' (2026-06-08)\n\u2022 Added input 'logos-module-builder/logos-cpp-sdk/logos-nix':\n    'github:logos-co/logos-nix/e637a1f' (2026-03-25)\n\u2022 Added input 'logos-module-builder/logos-cpp-sdk/logos-nix/nixpkgs':\n    'github:NixOS/nixpkgs/e9f00bd' (2025-09-28)\n\u2022 Added input 'logos-module-builder/logos-cpp-sdk/nixpkgs':\n    follows 'logos-module-builder/logos-cpp-sdk/logos-nix/nixpkgs'\n\u2022 Added input 'logos-module-builder/logos-module':\n    'github:logos-co/logos-module/780894d' (2026-06-04)\n\u2022 Added input 'logos-module-builder/logos-module/logos-nix':\n -module-install/nix-bundle-lgx/nixpkgs':\n    follows 'logos-module-builder/nix-bundle-logos-module-install/nix-bundle-lgx/logos-nix/nixpkgs'\n\u2022 Added input 'logos-module-builder/nix-bundle-logos-module-install/nixpkgs':\n    follows 'logos-module-builder/nix-bundle-logos-module-install/logos-nix/nixpkgs'\n\u2022 Added input 'logos-module-builder/nixpkgs':\n    follows 'logos-module-builder/logos-nix/nixpkgs'\nthese 2 derivations will be built:\n  /nix/store/hwavzibm1hp5k8cd3i2mb9hgfk0qkqq8-logos-notes_app-module-lib-1.0.0.drv\n  /nix/store/ic68zwqjd76jwxaac77p4mgvm6rv15yk-logos-notes_app-module.drv\nbuilding '/nix/store/hwavzibm1hp5k8cd3i2mb9hgfk0qkqq8-logos-notes_app-module-lib-1.0.0.drv'...\nbuilding '/nix/store/ic68zwqjd76jwxaac77p4mgvm6rv15yk-logos-notes_app-module.drv'...\n", "note": ""}]}, {"md": "## Step 4: Launch the app, click the button, and verify the round-trip\n\nLaunch the standalone app with `nix run` and drive it headlessly through its\nQML inspector. The doc-test builds\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) (the harness that\nconnects to the inspector), waits for the view to report **Connected** \u2014 i.e.\nthe replica finished its asynchronous handshake with the ui-host backend \u2014\nscreenshots the initial state, **clicks Add Note**, and confirms the call\ncrossed into the backend and back by asserting the result line changed to\n`Added note #1` \u2014 a string computed in the isolated backend and returned over\nthe socket via `logos.watch()`.\n\n> The app is launched with `QT_QPA_PLATFORM=offscreen`, so it runs without a\n> display \u2014 the same way it runs in CI. The backend still spawns as its own\n> `ui-host` process; only the rendering surface is virtual.", "execs": []}, {"md": "### 4.1 Launch and drive the app\n\n```bash\nnix run ./logos-notes-app\n```\n\nThe app on launch: the view reports **Connected** (the C++ backend\nreplica completed its handshake) and the result line reads **Press\nAdd Note to record o <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
